<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Message</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  height: 100vh;
  width: 100vw;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

.container {
  width: 90%;
  max-width: 800px;
}

h1 {
  font-size: 2.2rem;
  color: white;
  margin-bottom: 40px;
  line-height: 1.4;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}

#taunt {
  color: #fff;
  margin-bottom: 20px;
  font-size: 1.3rem;
  font-style: italic;
  min-height: 35px;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
}

.buttons {
  position: relative;
  height: 150px;
}

button {
  padding: 15px 35px;
  font-size: 1.2rem;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-weight: bold;
  transition: transform 0.1s ease;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

#yes {
  background: #ffffff;
  color: #ff4d6d;
}

#no {
  background: #ff4d6d;
  color: white;
  position: absolute;
  /* Initial position */
  left: 60%; 
  z-index: 10;
}

#fakeScreen {
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  width: 100vw;
  background: rgba(0, 0, 0, 0.95);
  color: #ff9a9e;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 2.2rem;
  flex-direction: column;
  z-index: 9999;
}
</style>
</head>
<body>

<div class="container">
  <h1>
    In the game of life, I may be just a king—slow and limited…<br>
    but with you by my side, I become unstoppable.<br><br>
    Will you be my queen? 👑
  </h1>

  <div id="taunt">Try to say no... if you can catch it. 😉</div>

  <div class="buttons">
    <button id="yes">❤️ Yes, Always</button>
    <button id="no">💔 No</button>
  </div>
</div>

<div id="fakeScreen">
  <div>💖 Awww! You said Yes Sweetheart! 💖</div>
  <div style="font-size:1.2rem; margin-top:20px; color: white;">Finalizing our fairy tale...</div>
</div>

<script>
const noBtn = document.getElementById("no");
const taunt = document.getElementById("taunt");

const taunts = [
  "Nice try, Your Majesty! 😘",
  "A Queen belongs by her King's side... ♟️",
  "The 'No' button is shy today! ✨",
  "You're chasing the wrong heart, look left! ❤️",
  "I've made it impossible to lose you. 😉",
  "Focus on the 'Yes', darling! 👑",
  "Catch me if you can, beautiful! 🏃‍♀️"
];

function moveButton() {
    // Generate a random jump between 80 and 150 pixels
    // This makes it "jump" far enough that they can't click it
    const jumpDist = 120; 
    
    // Get container boundaries to keep the button inside the visible area
    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    // Calculate new random position
    let newX = Math.random() * maxX;
    let newY = Math.random() * maxY;

    // Update position
    noBtn.style.position = 'fixed';
    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";

    // Update taunt text
    taunt.innerText = taunts[Math.floor(Math.random() * taunts.length)];
}

// Triggers when the mouse even starts to enter the button area
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault(); // Prevents mobile tapping
    moveButton();
});

// Final safety check - even if they manage to click, it won't work
noBtn.addEventListener("click", (e) => {
    e.preventDefault();
    moveButton();
});

// YES click logic
document.getElementById("yes").onclick = () => {
  document.getElementById("fakeScreen").style.display = "flex";
  setTimeout(() => {
    window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
  }, 3000);
};
</script>

</body>
</html>
