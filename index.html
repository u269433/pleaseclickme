<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Special Message</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      width: 90%;
    }

    h1 {
      font-size: 3rem;
      color: white;
      margin-bottom: 50px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    .buttons {
      position: relative;
      height: 200px;
    }

    button {
      padding: 15px 30px;
      font-size: 1.2rem;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      position: absolute;
      transition: 0.2s;
    }

    #yes {
      left: 30%;
      background: #00ff88;
    }

    #no {
      left: 60%;
      background: #ff4d6d;
      color: white;
    }

    button:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Will she be my queen? 👑💖</h1>

    <div class="buttons">
      <button id="yes">❤️ Yes</button>
      <button id="no">💔 No</button>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("no");

    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 50);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    document.getElementById("yes").onclick = () => {
      window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
    };
  </script>

</body>
</html>
