<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Message</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
  height: 100vh;
  width: 100vw;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

.container {
  width: 90%;
  max-width: 800px;
}

h1 {
  font-size: 2.5rem;
  color: white;
  margin-bottom: 50px;
  line-height: 1.4;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}

#taunt {
  color: #fff;
  margin-bottom: 30px;
  font-size: 1.4rem;
  font-style: italic;
  min-height: 40px; /* Maintains space even when empty */
  text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
}

.buttons {
  display: flex;
  justify-content: center;
  gap: 50px; /* Increased gap between buttons */
  position: relative;
}

button {
  padding: 20px 50px; /* Significantly larger buttons */
  font-size: 1.5rem;
  border: none;
  border-radius: 60px;
  cursor: pointer;
  font-weight: bold;
  transition: transform 0.1s ease, background 0.3s;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

#yes {
  background: #ffffff;
  color: #ff4d6d;
}

#yes:hover {
  background: #fff0f3;
  transform: scale(1.05);
}

#no {
  background: #ff4d6d;
  color: white;
  position: relative; /* Starts in flow, then switches to fixed */
  z-index: 999;
}

#fakeScreen {
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  width: 100vw;
  background: rgba(0, 0, 0, 0.95);
  color: #ff9a9e;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 2.5rem;
  flex-direction: column;
  z-index: 9999;
}
</style>
</head>
<body>

<div class="container">
  <h1>
    In the game of life, I may be just a king—slow and limited…<br>
    but with you by my side, I become unstoppable.<br><br>
    Will you be my queen? 👑
  </h1>

  <div id="taunt"></div>

  <div class="buttons">
    <button id="yes">❤️ Yes, Always</button>
    <button id="no">💔 No</button>
  </div>
</div>

<div id="fakeScreen">
  <div>💖 Awww! You said Yes Sweetheart! 💖</div>
  <div style="font-size:1.2rem; margin-top:20px; color: white;">Finalizing our fairy tale...</div>
</div>

<script>
const noBtn = document.getElementById("no");
const taunt = document.getElementById("taunt");

const taunts = [
  "Nice try, Your Majesty! 😘",
  "A Queen belongs by her King's side... ♟️",
  "The 'No' button is shy today! ✨",
  "You're chasing the wrong heart, look left! ❤️",
  "I've made it impossible to lose you. 😉",
  "Focus on the 'Yes', darling! 👑",
  "Catch me if you can, beautiful! 🏃‍♀️"
];

function moveButton() {
    // Determine screen limits
    const maxX = window.innerWidth - noBtn.offsetWidth - 30;
    const maxY = window.innerHeight - noBtn.offsetHeight - 30;

    // Generate random positions
    let newX = Math.random() * maxX;
    let newY = Math.random() * maxY;

    // Apply new positions
    noBtn.style.position = 'fixed';
    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";

    // Show and update taunt text only when she interacts with 'No'
    taunt.innerText = taunts[Math.floor(Math.random() * taunts.length)];
}

// Trigger on hover
noBtn.addEventListener("mouseover", moveButton);

// Trigger on touch (for phones)
noBtn.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveButton();
});

// Final click prevention
noBtn.addEventListener("click", (e) => {
    e.preventDefault();
    moveButton();
});

// YES click logic
document.getElementById("yes").onclick = () => {
  document.getElementById("fakeScreen").style.display = "flex";
  setTimeout(() => {
    window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
  }, 3000);
};
</script>

</body>
</html>
