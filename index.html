<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Special Message</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      width: 90%;
    }

    h1 {
      font-size: 2.8rem;
      color: white;
      margin-bottom: 60px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
      line-height: 1.4;
    }

    .buttons {
      position: relative;
      height: 200px;
    }

    button {
      padding: 15px 30px;
      font-size: 1.2rem;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      position: absolute;
      transition: 0.15s ease;
    }

    #yes {
      left: 35%;
      background: #00ff88;
    }

    #no {
      left: 55%;
      background: #ff4d6d;
      color: white;
    }

    button:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>
      In the game of life, I may be just a king—slow and limited…<br>
      but with you by my side, I become unstoppable.<br><br>
      Will you be my queen? 👑♟️
    </h1>

    <div class="buttons">
      <button id="yes">❤️ Yes</button>
      <button id="no">💔 No</button>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("no");

    document.addEventListener("mousemove", (e) => {
      const rect = noBtn.getBoundingClientRect();

      const distanceX = e.clientX - (rect.left + rect.width / 2);
      const distanceY = e.clientY - (rect.top + rect.height / 2);

      const distance = Math.sqrt(distanceX * distanceX + distanceY * distanceY);

      // If cursor is close, move away
      if (distance < 120) {
        let moveX = (Math.random() - 0.5) * 200;
        let moveY = (Math.random() - 0.5) * 200;

        let newX = rect.left + moveX;
        let newY = rect.top + moveY;

        // Keep inside screen
        newX = Math.max(0, Math.min(window.innerWidth - rect.width, newX));
        newY = Math.max(0, Math.min(window.innerHeight - rect.height, newY));

        noBtn.style.left = newX + "px";
        noBtn.style.top = newY + "px";
      }
    });

    document.getElementById("yes").onclick = () => {
      window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
    };
  </script>

</body>
</html>
