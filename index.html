<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Message</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  width: 100vw;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

.container {
  width: 90%;
}

h1 {
  font-size: 2.6rem;
  color: white;
  margin-bottom: 60px;
  line-height: 1.4;
}

/* ❤️ HEART BUTTON SHAPE */
.heart-btn {
  position: absolute;
  width: 120px;
  height: 110px;
  background: red;
  transform: rotate(-45deg);
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
}

.heart-btn::before,
.heart-btn::after {
  content: "";
  width: 120px;
  height: 110px;
  background: inherit;
  border-radius: 50%;
  position: absolute;
}

.heart-btn::before {
  top: -60px;
  left: 0;
}

.heart-btn::after {
  left: 60px;
  top: 0;
}

.heart-text {
  position: absolute;
  transform: rotate(45deg);
  color: white;
  font-weight: bold;
  font-size: 1.2rem;
  z-index: 2;
}

/* YES */
#yes {
  left: 35%;
  background: #00c853;
}

/* NO (broken heart) */
#no {
  left: 55%;
  background: #ff1744;
}

/* broken effect */
#no::after {
  background: #ff1744;
  clip-path: polygon(0 0, 50% 0, 30% 100%, 0 100%);
}

#no::before {
  background: #ff1744;
  clip-path: polygon(50% 0, 100% 0, 100% 100%, 70% 100%);
}

</style>
</head>

<body>

<div class="container">
  <h1>
    In the game of life, I may be just a king—slow and limited…<br>
    but with you by my side, I become unstoppable.<br><br>
    Will you be my queen? 👑♟️
  </h1>

  <!-- YES -->
  <div id="yes" class="heart-btn">
    <div class="heart-text">YES</div>
  </div>

  <!-- NO -->
  <div id="no" class="heart-btn">
    <div class="heart-text">NO</div>
  </div>

</div>

<script>
const noBtn = document.getElementById("no");

// Move slightly away (10–15px)
document.addEventListener("mousemove", (e) => {
  const rect = noBtn.getBoundingClientRect();

  const dx = e.clientX - (rect.left + rect.width / 2);
  const dy = e.clientY - (rect.top + rect.height / 2);

  const distance = Math.sqrt(dx * dx + dy * dy);

  if (distance < 100) {
    const moveX = (dx > 0 ? -1 : 1) * (10 + Math.random() * 5);
    const moveY = (dy > 0 ? -1 : 1) * (10 + Math.random() * 5);

    let newX = rect.left + moveX;
    let newY = rect.top + moveY;

    // keep inside screen
    newX = Math.max(0, Math.min(window.innerWidth - rect.width, newX));
    newY = Math.max(0, Math.min(window.innerHeight - rect.height, newY));

    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";
  }
});

// YES → Rickroll
document.getElementById("yes").onclick = () => {
  window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
};
</script>

</body>
</html>
