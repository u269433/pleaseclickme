<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Message</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  width: 100vw;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

.container {
  width: 90%;
}

h1 {
  font-size: 2.5rem;
  color: white;
  margin-bottom: 40px;
  line-height: 1.4;
}

#taunt {
  color: white;
  margin-bottom: 20px;
  font-size: 1.2rem;
  min-height: 30px;
}

.buttons {
  position: relative;
  height: 200px;
}

/* NORMAL BUTTON STYLE */
button {
  padding: 15px 30px;
  font-size: 1.2rem;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  position: fixed; /* Changed to fixed for easier screen-wide dodging */
  transition: all 0.1s ease; /* Smooths the 8-10px jitter */
}

/* YES */
#yes {
  left: 40%;
  top: 60%;
  transform: translateX(-50%);
  background: #00ff88;
}

/* NO */
#no {
  left: 60%;
  top: 60%;
  transform: translateX(-50%);
  background: #ff4d6d;
  color: white;
  z-index: 999;
}

/* Fake screen */
#fakeScreen {
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  width: 100vw;
  background: black;
  color: pink;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  flex-direction: column;
  z-index: 1000;
}
</style>
</head>

<body>

<div class="container">
  <h1>
    In the game of life, I may be just a king—slow and limited…<br>
    but with you by my side, I become unstoppable.<br><br>
    Will you be my queen? 👑♟️
  </h1>

  <div id="taunt"></div>

  <div class="buttons">
    <button id="yes">❤️ Yes</button>
    <button id="no">💔 No</button>
  </div>
</div>

<div id="fakeScreen">
  <div>💖 Awww! You said Yes Sweetheart! 💖</div>
  <div style="font-size:1rem;margin-top:20px;">Loading...</div>
</div>

<script>
const noBtn = document.getElementById("no");
const taunt = document.getElementById("taunt");

const taunts = [
  "Why are you clicking me? 😏",
  "Bro choose YES 😂",
  "You can't catch me!",
  "Scared of commitment? 👀",
  "Just press YES already 😭"
];

// Dodge Logic
document.addEventListener("mousemove", (e) => {
  const x = e.clientX;
  const y = e.clientY;
  const rect = noBtn.getBoundingClientRect();
  
  // Calculate center of button
  const buttonCenterX = rect.left + rect.width / 2;
  const buttonCenterY = rect.top + rect.height / 2;

  // Calculate distance between cursor and button center
  const distance = Math.sqrt(Math.pow(x - buttonCenterX, 2) + Math.pow(y - buttonCenterY, 2));

  // If cursor is within 80px, move the button 8-10px away
  if (distance < 80) {
    taunt.innerText = taunts[Math.floor(Math.random() * taunts.length)];

    const angle = Math.atan2(buttonCenterY - y, buttonCenterX - x);
    const moveDist = 8 + Math.random() * 2; // 8-10 pixels move

    let newX = rect.left + Math.cos(angle) * moveDist;
    let newY = rect.top + Math.sin(angle) * moveDist;

    // Keep inside screen boundaries
    const padding = 20;
    if (newX < padding) newX = padding + 50;
    if (newX > window.innerWidth - rect.width - padding) newX = window.innerWidth - rect.width - 70;
    if (newY < padding) newY = padding + 50;
    if (newY > window.innerHeight - rect.height - padding) newY = window.innerHeight - rect.height - 70;

    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";
  }
});

// Extra safety: prevent click and move away on click attempt
noBtn.addEventListener("click", (e) => {
  e.preventDefault();
  alert("Nice try! But you have to say Yes! 😉");
});

// YES click
document.getElementById("yes").onclick = () => {
  document.getElementById("fakeScreen").style.display = "flex";

  setTimeout(() => {
    // Redirects to a romantic song or your specific link
    window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
  }, 2500);
};
</script>

</body>
</html>
