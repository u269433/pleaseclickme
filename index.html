<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Message</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  width: 100vw;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

.container {
  width: 90%;
  position: relative;
}

h1 {
  font-size: 2.5rem;
  color: white;
  margin-bottom: 40px;
  line-height: 1.4;
}

#taunt {
  color: white;
  margin-bottom: 20px;
  font-size: 1.2rem;
  min-height: 30px;
}

.buttons {
  position: relative;
  height: 200px;
}

/* IMPORTANT: fixed positioning prevents glitch */
button {
  padding: 15px 30px;
  font-size: 1.2rem;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  position: fixed;
  transition: 0.15s linear;
}

#yes {
  left: 35%;
  top: 65%;
  background: #00ff88;
}

#no {
  left: 55%;
  top: 65%;
  background: #ff4d6d;
  color: white;
}

/* Fake screen */
#fakeScreen {
  position: fixed;
  top: 0;
  left: 0;
  height: 100vh;
  width: 100vw;
  background: black;
  color: pink;
  display: none;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  flex-direction: column;
}
</style>
</head>

<body>

<div class="container">
  <h1>
    In the game of life, I may be just a king—slow and limited…<br>
    but with you by my side, I become unstoppable.<br><br>
    Will you be my queen? 👑♟️
  </h1>

  <div id="taunt"></div>
</div>

<div class="buttons">
  <button id="yes">❤️ Yes</button>
  <button id="no">💔 No</button>
</div>

<div id="fakeScreen">
  <div>💖 Aww! you said yes Sweetheart 💖</div>
  <div style="font-size:1rem;margin-top:20px;">Loading...</div>
</div>

<script>
const noBtn = document.getElementById("no");
const taunt = document.getElementById("taunt");

const taunts = [
  "Why are you clicking me? 😏",
  "Bro choose YES 😂",
  "You can't catch me!",
  "Scared of commitment? 👀",
  "Just press YES already 😭"
];

// DODGE ONLY WHEN CLICK ATTEMPTED
noBtn.addEventListener("mousedown", (e) => {
  e.preventDefault();

  taunt.innerText = taunts[Math.floor(Math.random() * taunts.length)];

  const rect = noBtn.getBoundingClientRect();

  // move ONLY 2–3px randomly
  let moveX = (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random());
  let moveY = (Math.random() > 0.5 ? 1 : -1) * (2 + Math.random());

  let newX = rect.left + moveX;
  let newY = rect.top + moveY;

  // keep inside screen
  newX = Math.max(0, Math.min(window.innerWidth - rect.width, newX));
  newY = Math.max(0, Math.min(window.innerHeight - rect.height, newY));

  noBtn.style.left = newX + "px";
  noBtn.style.top = newY + "px";
});

// YES click
document.getElementById("yes").onclick = () => {
  let count = localStorage.getItem("yesClicks") || 0;
  count++;
  localStorage.setItem("yesClicks", count);

  console.log("YES clicked:", count);

  document.getElementById("fakeScreen").style.display = "flex";

  setTimeout(() => {
    window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
  }, 2500);
};
</script>

</body>
</html>
