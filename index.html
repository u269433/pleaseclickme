<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Message</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  width: 100vw;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  overflow: hidden;
}

.container {
  width: 100%;
  position: relative;
}

h1 {
  font-size: 2.5rem;
  color: white;
  margin-bottom: 80px;
  line-height: 1.4;
}

/* ❤️ HEART BASE */
.heart {
  position: absolute;
  width: 100px;
  height: 100px;
  transform: rotate(-45deg);
  cursor: pointer;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: inherit;
}

.heart::before {
  top: -50px;
  left: 0;
}

.heart::after {
  left: 50px;
  top: 0;
}

.text {
  position: absolute;
  transform: rotate(45deg);
  color: white;
  font-weight: bold;
  font-size: 1.1rem;
  width: 100%;
  text-align: center;
  top: 35%;
}

/* YES HEART */
#yes {
  background: #00c853;
  left: 40%;
  top: 60%;
}

/* BROKEN HEART (two halves) */
#no {
  left: 55%;
  top: 60%;
  position: absolute;
}

/* left half */
#no .left,
#no .right {
  position: absolute;
  width: 50px;
  height: 100px;
  background: #ff1744;
  transform: rotate(-45deg);
}

#no .left::before,
#no .left::after,
#no .right::before,
#no .right::after {
  content: "";
  position: absolute;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #ff1744;
}

#no .left::before { top: -25px; left: 0; }
#no .left::after  { top: 0; left: 25px; }

#no .right::before { top: -25px; left: 0; }
#no .right::after  { top: 0; left: 25px; }

#no .left {
  left: 0;
  clip-path: polygon(0 0, 100% 0, 60% 100%, 0 100%);
}

#no .right {
  left: 50px;
  clip-path: polygon(40% 0, 100% 0, 100% 100%, 0 100%);
}

/* text inside */
#no .text {
  width: 100px;
  left: 0;
  transform: rotate(45deg);
}

</style>
</head>

<body>

<div class="container">

  <h1>
    In the game of life, I may be just a king—slow and limited…<br>
    but with you by my side, I become unstoppable.<br><br>
    Will you be my queen? 👑♟️
  </h1>

  <!-- YES -->
  <div id="yes" class="heart">
    <div class="text">YES</div>
  </div>

  <!-- NO (broken heart) -->
  <div id="no">
    <div class="left"></div>
    <div class="right"></div>
    <div class="text">NO</div>
  </div>

</div>

<script>
const noBtn = document.getElementById("no");

document.addEventListener("mousemove", (e) => {
  const rect = noBtn.getBoundingClientRect();

  const dx = e.clientX - (rect.left + rect.width / 2);
  const dy = e.clientY - (rect.top + rect.height / 2);
  const distance = Math.sqrt(dx*dx + dy*dy);

  if (distance < 120) {
    // move anywhere on screen randomly
    const newX = Math.random() * (window.innerWidth - rect.width);
    const newY = Math.random() * (window.innerHeight - rect.height);

    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";
  }
});

// YES → Rickroll
document.getElementById("yes").onclick = () => {
  window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
};
</script>

</body>
</html>
